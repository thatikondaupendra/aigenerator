version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cinehuman-backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./outputs:/app/outputs
      - ./lora:/app/lora
      - ./workflows:/app/workflows
    environment:
      - CINEHUMAN_HOST=0.0.0.0
      - CINEHUMAN_PORT=8000
      - CINEHUMAN_ALLOW_CPU=false
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
    container_name: cinehuman-frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE=/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  models:
  outputs:
  lora:
  workflows:
